server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:4306/playmate
    username: playmate
    password: playmate
    driver-class-name: com.mysql.cj.jdbc.driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibrnate.orm.jdbc.bind: trace